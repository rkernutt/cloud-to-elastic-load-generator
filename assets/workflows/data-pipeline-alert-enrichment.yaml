# Data Pipeline Alert → ServiceNow CMDB Enrichment → Notification
#
# Triggers on any [CloudLoadGen] data-pipeline alerting rule, looks up the
# affected CI in ServiceNow CMDB, opens a Kibana case if multiple incidents
# are open, and emails the on-call group via the deployment's preconfigured
# SMTP connector. Slack / Teams / PagerDuty / ServiceNow ITSM / Opsgenie /
# webhook alternatives are commented out further down.
#
# Installs DISABLED. Three manual steps before it can run:
#   1. Review (or replace) the notify_email step.
#   2. Attach to your alerting rules — every rule ships with actions=[].
#   3. Flip the Enabled toggle in Stack Management → Workflows.
#
# Full guide (deployment matrix, sizing, self-hosted SMTP setup, step
# reference, troubleshooting): docs/workflow-deployment.md

name: Data Pipeline Alert — CMDB Enrichment & Notification
description: >
  Enriches data pipeline alerts with ServiceNow CMDB context (CI owner,
  support group, open incidents) and emails the on-call group via the
  deployment's preconfigured SMTP connector so the right person can be
  contacted immediately.
# Installs DISABLED on purpose — see header comment above.
enabled: false
tags:
  - data-pipeline
  - servicenow
  - enrichment
  - automated-response

consts:
  servicenowIndex: "logs-servicenow.event-*"
  pipelineLogsIndex: "logs-*"

inputs:
  - name: emailConnector
    type: string
    required: true
    default: "elastic-cloud-email"
    description: "Email connector ID. `elastic-cloud-email` is preconfigured on Cloud; self-hosted: see docs."
  - name: notifyTo
    type: string
    required: true
    default: "data-platform-oncall@example.com"
    description: "Recipient address for notify_email"
  - name: slackConnector
    type: string
    required: false
    default: "data-pipeline-alerts"
    description: "Slack connector ID — only used if you uncomment notify_slack"

triggers:
  - type: alert

steps:
  # 0. Pre-flight — fail fast if the email connector is missing.
  - name: log_preflight
    type: console
    with:
      message: |
        Pre-flight check:
          emailConnector: {{ inputs.emailConnector }}
          notifyTo:       {{ inputs.notifyTo }}
  - name: validate_email_connector
    type: kibana.request
    with:
      method: GET
      path: "/api/actions/connector/{{ inputs.emailConnector }}"

  # 1. Log the inbound alert.
  - name: log_alert_received
    type: console
    with:
      message: >
        Pipeline alert received: {{ event.alerts[0].kibana.alert.rule.name }}
        Reason: {{ event.alerts[0].message }}

  # 2. Find the user who triggered the pipeline run.
  #    Note: uses elasticsearch.request because the named elasticsearch.search
  #    step rejects body-style sort clauses on Workflows v1.0.0.
  - name: find_pipeline_user
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.pipelineLogsIndex }}/_search"
      body:
        size: 1
        sort:
          - "@timestamp":
              order: "desc"
        query:
          bool:
            must:
              - exists:
                  field: "user.name"
              - range:
                  "@timestamp":
                    gte: "now-1h"
            filter:
              - bool:
                  should:
                    - term:
                        event.dataset: "aws.mwaa"
                    - term:
                        event.dataset: "gcp.composer"
                    - term:
                        event.dataset: "azure.data_factory"
                    - term:
                        event.dataset: "aws.emr_logs"
                    - term:
                        event.dataset: "gcp.dataproc"
    on-failure:
      continue: true

  # 3. Look up the user's full ServiceNow profile (email, phone, manager).
  - name: lookup_servicenow_user
    type: elasticsearch.search
    with:
      index: "{{ consts.servicenowIndex }}"
      size: 1
      query:
        bool:
          must:
            - term:
                tags: "sys_user"
            - term:
                servicenow.event.user_name.value: "{{ steps.find_pipeline_user.output.hits.hits[0]._source.user.name }}"
    on-failure:
      continue: true

  # 4. Look up the affected CI in ServiceNow CMDB.
  - name: lookup_affected_ci
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.servicenowIndex }}/_search"
      body:
        size: 3
        query:
          bool:
            must:
              - term:
                  tags: "cmdb_ci"
            should:
              - match:
                  servicenow.event.category.value: "Cloud Service"
              - match:
                  servicenow.event.category.value: "Compute"
            minimum_should_match: 1
        sort:
          - "@timestamp":
              order: "desc"
    on-failure:
      continue: true

  # 5. Check for open incidents on the same infrastructure.
  - name: find_open_incidents
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.servicenowIndex }}/_search"
      body:
        size: 5
        query:
          bool:
            must:
              - term:
                  tags: "incident"
            must_not:
              - term:
                  servicenow.event.state.display_value: "Resolved"
              - term:
                  servicenow.event.state.display_value: "Closed"
            filter:
              - range:
                  "@timestamp":
                    gte: "now-7d"
        sort:
          - "@timestamp":
              order: "desc"
    on-failure:
      continue: true

  # 6. Find recent change requests that might explain the failure.
  - name: find_recent_changes
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.servicenowIndex }}/_search"
      body:
        size: 3
        query:
          bool:
            must:
              - term:
                  tags: "change_request"
              - range:
                  "@timestamp":
                    gte: "now-7d"
        sort:
          - "@timestamp":
              order: "desc"
    on-failure:
      continue: true

  # 7. Open a Kibana case when multiple incidents are already open.
  #    On Stack 9.4+ the installer auto-swaps the case step for the
  #    cleaner cases.createCase variant — see docs/workflow-deployment.md.
  - name: check_severity
    type: if
    condition: "steps.find_open_incidents.output.hits.total.value > 2"
    steps:
      - name: create_case
        type: kibana.createCaseDefaultSpace
        with:
          title: "Pipeline Alert Escalation: {{ event.alerts[0].kibana.alert.rule.name }}"
          description: |
            ## Alert Details
            **Rule:** {{ event.alerts[0].kibana.alert.rule.name }}
            **Message:** {{ event.alerts[0].message }}

            ## Affected Infrastructure
            **CI:** {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
            **Owner:** {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
            **Support Group:** {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.support_group.display_value }}

            ## Pipeline User
            **Triggered by:** {{ steps.find_pipeline_user.output.hits.hits[0]._source.user.name }}
            **Email:** {{ steps.lookup_servicenow_user.output.hits.hits[0]._source.servicenow.event.email.value }}
            **Phone:** {{ steps.lookup_servicenow_user.output.hits.hits[0]._source.servicenow.event.phone.value }}

            ## Open Incidents ({{ steps.find_open_incidents.output.hits.total.value }})
            This CI has multiple open incidents. Escalating for review.
          owner: "observability"
          severity: "high"
          tags:
            - data-pipeline
            - escalation
            - workflow-generated
          settings:
            syncAlerts: false
          connector:
            id: "none"
            name: "none"
            type: ".none"
            fields: null

  # 8. Send enriched notification.
  #    Default channel: email. To switch, comment out notify_email and
  #    uncomment one of the alternative blocks below. See "Switching to a
  #    different channel" in docs/workflow-deployment.md.
  #    Retries 2x then continues so step 9 still runs on transient SMTP
  #    failures (the pre-flight already proved the connector exists).
  - name: notify_email
    type: email
    connector-id: "{{ inputs.emailConnector }}"
    with:
      to:
        - "{{ inputs.notifyTo }}"
      subject: "[Data Pipeline Alert] {{ event.alerts[0].kibana.alert.rule.name }}"
      message: |
        Pipeline alert received.

        Rule:           {{ event.alerts[0].kibana.alert.rule.name }}
        Alert:          {{ event.alerts[0].message }}

        Affected CI:    {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
        CI Owner:       {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
        Support Group:  {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.support_group.display_value }}
        Department:     {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.department.display_value }}

        Pipeline triggered by: {{ steps.find_pipeline_user.output.hits.hits[0]._source.user.name }}
        Contact email:  {{ steps.lookup_servicenow_user.output.hits.hits[0]._source.servicenow.event.email.value }}
        Contact phone:  {{ steps.lookup_servicenow_user.output.hits.hits[0]._source.servicenow.event.phone.value }}
        Manager:        {{ steps.lookup_servicenow_user.output.hits.hits[0]._source.servicenow.event.manager.display_value }}

        Open incidents: {{ steps.find_open_incidents.output.hits.total.value }}
        Recent changes: {{ steps.find_recent_changes.output.hits.total.value }}
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  # ── Notification alternatives — comment out notify_email above and
  # ── uncomment one (or several) of the blocks below. Each needs a
  # ── connector you've already configured in Stack Management → Connectors.
  # ── Recipe details + connector setup: docs/workflow-deployment.md.

  # Slack (.slack or .slack_api connector)
  # - name: notify_slack
  #   type: slack
  #   connector-id: "{{ inputs.slackConnector }}"
  #   with:
  #     message: |
  #       :rotating_light: *Data Pipeline Alert*
  #       *Rule:* {{ event.alerts[0].kibana.alert.rule.name }}
  #       *Alert:* {{ event.alerts[0].message }}
  #       *Affected CI:* {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
  #       *CI Owner:* {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
  #       *Open incidents:* {{ steps.find_open_incidents.output.hits.total.value }}
  #   on-failure:
  #     retry: { max-attempts: 2, delay: "5s" }
  #     continue: true

  # Microsoft Teams (incoming webhook connector)
  # - name: notify_teams
  #   type: teams
  #   connector-id: "data-platform-teams-channel"
  #   with:
  #     message: |
  #       **Data Pipeline Alert**
  #       **Rule:** {{ event.alerts[0].kibana.alert.rule.name }}
  #       **Affected CI:** {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
  #       **CI Owner:** {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
  #       **Open incidents:** {{ steps.find_open_incidents.output.hits.total.value }}
  #   on-failure: { continue: true }

  # PagerDuty
  # - name: notify_pagerduty
  #   type: pagerduty
  #   connector-id: "data-platform-pagerduty"
  #   with:
  #     eventAction: "trigger"          # trigger | acknowledge | resolve
  #     dedupKey: "pipeline-{{ event.alerts[0].kibana.alert.uuid }}"
  #     summary: "Pipeline alert: {{ event.alerts[0].kibana.alert.rule.name }}"
  #     severity: "error"               # critical | error | warning | info
  #     source: "elastic-cloud-loadgen"
  #     customDetails:
  #       affected_ci: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}"
  #       ci_owner: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}"
  #       open_incidents: "{{ steps.find_open_incidents.output.hits.total.value }}"
  #   on-failure: { continue: true }

  # ServiceNow ITSM (creates an incident)
  # - name: notify_servicenow
  #   type: servicenow
  #   connector-id: "servicenow-itsm-prod"
  #   with:
  #     subAction: "pushToService"
  #     subActionParams:
  #       incident:
  #         short_description: "Pipeline alert: {{ event.alerts[0].kibana.alert.rule.name }}"
  #         description: |
  #           Affected CI:    {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
  #           CI Owner:       {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
  #           Open incidents: {{ steps.find_open_incidents.output.hits.total.value }}
  #         severity: "2"                 # 1 high · 2 medium · 3 low
  #         urgency: "2"
  #         impact: "2"
  #         category: "Software"
  #   on-failure: { continue: true }

  # Opsgenie
  # - name: notify_opsgenie
  #   type: opsgenie
  #   connector-id: "data-platform-opsgenie"
  #   with:
  #     subAction: "createAlert"
  #     subActionParams:
  #       message: "Pipeline alert: {{ event.alerts[0].kibana.alert.rule.name }}"
  #       description: |
  #         Affected CI:    {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
  #         CI Owner:       {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
  #         Open incidents: {{ steps.find_open_incidents.output.hits.total.value }}
  #       priority: "P2"                  # P1 (highest) … P5 (lowest)
  #       tags: ["data-pipeline", "workflow-generated"]
  #   on-failure: { continue: true }

  # Generic webhook
  # - name: notify_webhook
  #   type: webhook
  #   connector-id: "internal-on-call-webhook"
  #   with:
  #     body: |
  #       {
  #         "rule": "{{ event.alerts[0].kibana.alert.rule.name }}",
  #         "ci": "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}",
  #         "owner": "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}",
  #         "open_incidents": "{{ steps.find_open_incidents.output.hits.total.value }}"
  #       }
  #   on-failure: { continue: true }

  # 9. Index the enriched record back to Elasticsearch for dashboards.
  - name: index_enriched_alert
    type: elasticsearch.index
    with:
      index: "logs-pipeline-alert-enriched-default"
      document:
        "@timestamp": "{{ execution.startedAt }}"
        event:
          kind: "enrichment"
          category: ["configuration"]
          dataset: "pipeline.alert.enriched"
        alert:
          rule_name: "{{ event.alerts[0].kibana.alert.rule.name }}"
          message: "{{ event.alerts[0].message }}"
        pipeline:
          user: "{{ steps.find_pipeline_user.output.hits.hits[0]._source.user.name }}"
          user_email: "{{ steps.lookup_servicenow_user.output.hits.hits[0]._source.servicenow.event.email.value }}"
        servicenow:
          ci_name: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}"
          ci_owner: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}"
          support_group: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.support_group.display_value }}"
          open_incident_count: "{{ steps.find_open_incidents.output.hits.total.value }}"
          recent_change_count: "{{ steps.find_recent_changes.output.hits.total.value }}"
    on-failure:
      continue: true

  - name: log_complete
    type: console
    with:
      message: >
        Enrichment complete for alert: {{ event.alerts[0].kibana.alert.rule.name }}.
        CI: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }},
        Owner: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }},
        Open incidents: {{ steps.find_open_incidents.output.hits.total.value }}
