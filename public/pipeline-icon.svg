<svg viewBox="135 58 370 284" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes flow {
      0%   { stroke-dashoffset: 80; opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes hub-breathe {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.75; }
    }
    .stream { stroke-dasharray: 7 5; stroke-dashoffset: 80; fill: none; stroke-linecap: round; }
    .s1 { animation: flow 2.0s linear infinite 0.0s; }
    .s2 { animation: flow 2.0s linear infinite 0.4s; }
    .s3 { animation: flow 2.0s linear infinite 0.8s; }
    .s4 { animation: flow 2.0s linear infinite 1.2s; }
    .s5 { animation: flow 2.0s linear infinite 1.6s; }
    .hub-glow { animation: hub-breathe 2.6s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .stream, .hub-glow { animation: none; opacity: 1; stroke-dashoffset: 0; }
    }
  </style>
  <marker id="ah2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <clipPath id="elastic-clip2">
    <rect x="430" y="172" width="62" height="56" rx="10"/>
  </clipPath>
</defs>

<!-- ═══ ELASTIC HUB ══════════════════════════════════════════════════════ -->
<rect class="hub-glow" x="422" y="164" width="78" height="72" rx="14" fill="none" stroke="#FF70B8" stroke-width="2.5"/>
<rect x="430" y="172" width="62" height="56" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
<g clip-path="url(#elastic-clip2)">
  <rect x="430" y="172" width="62" height="18" fill="#FF4FA8"/>
  <rect x="430" y="191" width="62" height="18" fill="#00D8CF"/>
  <rect x="430" y="210" width="30" height="18" fill="#4EC9FF"/>
  <rect x="461" y="210" width="31" height="18" fill="#FFD340"/>
</g>

