<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Generate realistic AWS, GCP, and Azure logs, metrics, and traces into Elasticsearch for demos, dashboard validation, and capacity testing."
    />
    <title>Cloud Loadgen for Elastic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Elastic brand typography: Inter (body/headline) + Space Mono (code/numerals). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        /* Match the light theme body token so there is no off-brand flash
           before React mounts (ThemeProvider keeps this in sync afterwards). */
        background: #f6f9fc;
        font-family: "Inter", Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
