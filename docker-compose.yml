# Build needs a full installer/ tree on disk (Docker only COPYs what exists in this directory).
# If the image build errors on missing AWS paths, on the host run:
#   ls -d installer/aws-custom-dashboards installer/aws-custom-ml-jobs
# If either is missing, fix checkout, e.g.:
#   git sparse-checkout add installer/aws-custom-dashboards installer/aws-custom-ml-jobs installer/aws-custom-pipelines
#   git sparse-checkout reapply
# or: git sparse-checkout disable
# Then: docker compose build --no-cache

services:
  cloud-to-elastic-load-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-to-elastic-load-generator:latest
    container_name: cloud-to-elastic-load-generator
    ports:
      - "8765:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.description=Cloud to Elastic Load Generator (AWS, GCP, Azure)"
