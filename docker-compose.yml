# Build needs installer/*-custom-* paths on disk (Docker COPY only sends what exists).
# Before building: ./scripts/assert-installer-for-docker.sh  (catches symlinks Docker will skip)
# Missing AWS dirs (sparse-checkout OFF): git checkout HEAD -- installer/aws-custom-dashboards installer/aws-custom-ml-jobs
# Sparse-checkout ON only: git sparse-checkout add … && git sparse-checkout reapply

services:
  cloud-to-elastic-load-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-to-elastic-load-generator:latest
    container_name: cloud-to-elastic-load-generator
    ports:
      - "8765:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.description=Cloud to Elastic Load Generator (AWS, GCP, Azure)"
