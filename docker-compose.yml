# Easiest: ./docker-up  (build + start). Or: npm run docker:up
# Installer JSON must exist under installer/ (full git clone). Wizard state is in the browser only.

services:
  cloud-to-elastic-load-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-to-elastic-load-generator:latest
    container_name: cloud-to-elastic-load-generator
    ports:
      - "8765:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.description=Cloud to Elastic Load Generator (AWS, GCP, Azure)"
