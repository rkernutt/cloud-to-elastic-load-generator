# Security Alert → CMDB Enrichment → Attack Context Notification
#
# Triggers on security alerts (IAM PrivEsc, Data Exfil, GuardDuty, etc.),
# enriches with ServiceNow CMDB context including the originating IP address
# and hostname of the attacked infrastructure, and emails the SOC team.
#
# Designed for AI SOC demos with Attack Discovery and Agent Builder.
#
# Installs DISABLED. Three steps before it runs:
#   1. Review the notify_email step (or switch to Slack/Teams/PagerDuty).
#   2. Attach to detection rules or stack alerting rules.
#   3. Flip Enabled in Stack Management → Workflows.

name: Security Alert — CMDB Enrichment & Attack Context
description: >
  Enriches security alerts with ServiceNow CMDB context (originating IP,
  hostname, CI owner, support group) and attack attribution (source IP,
  user agent, MITRE tactic) so the SOC analyst has full context on first look.
enabled: false
tags:
  - security
  - soc
  - servicenow
  - enrichment
  - attack-discovery

consts:
  servicenowIndex: "logs-servicenow.event-*"
  cloudtrailIndex: "logs-aws.cloudtrail*"
  securityAlertsIndex: ".alerts-security.alerts-*"

inputs:
  - name: emailConnector
    type: string
    required: true
    default: "elastic-cloud-email"
    description: "Email connector ID"
  - name: notifyTo
    type: string
    required: true
    default: "soc-oncall@example.com"
    description: "SOC team recipient address"

triggers:
  - type: alert

steps:
  # 0. Pre-flight
  - name: log_preflight
    type: console
    with:
      message: |
        Security alert enrichment starting:
          emailConnector: Elastic-Cloud-SMTP
          notifyTo:       rob.kernutt@elastic.co

  # 1. Log the inbound alert
  - name: log_alert_received
    type: console
    with:
      message: >
        Security alert received: {{ event.alerts[0].kibana.alert.rule.name }}
        Reason: {{ event.alerts[0].message }}

  # 2. Find the attacker's source IP and user from CloudTrail events
  - name: find_attack_source
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.cloudtrailIndex }}/_search"
      body:
        size: 1
        sort:
          - "@timestamp":
              order: "desc"
        query:
          bool:
            must:
              - exists:
                  field: "source.ip"
              - exists:
                  field: "user.name"
              - range:
                  "@timestamp":
                    gte: "now-1h"
            filter:
              - bool:
                  should:
                    - term:
                        event.action: "CreateAccessKey"
                    - term:
                        event.action: "AttachUserPolicy"
                    - term:
                        event.action: "AssumeRole"
                    - term:
                        event.action: "ListUsers"
                    - exists:
                        field: "labels.attack_session_id"
    on-failure:
      continue: true

  # 3. Look up the affected host/CI in CMDB by hostname or IP
  - name: lookup_affected_ci
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.servicenowIndex }}/_search"
      body:
        size: 3
        query:
          bool:
            must:
              - term:
                  tags: "cmdb_ci"
            should:
              - match:
                  servicenow.event.category.value: "Compute"
              - match:
                  servicenow.event.category.value: "Security"
              - match:
                  servicenow.event.category.value: "Cloud Service"
              - match:
                  servicenow.event.category.value: "Identity"
            minimum_should_match: 1
        sort:
          - "@timestamp":
              order: "desc"
    on-failure:
      continue: true

  # 4. Look up the attacked user's ServiceNow profile
  - name: lookup_target_user
    type: elasticsearch.search
    with:
      index: "{{ consts.servicenowIndex }}"
      size: 1
      query:
        bool:
          must:
            - term:
                tags: "sys_user"
    on-failure:
      continue: true

  # 5. Check for open security incidents
  - name: find_open_incidents
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.servicenowIndex }}/_search"
      body:
        size: 5
        query:
          bool:
            must:
              - term:
                  tags: "incident"
            must_not:
              - term:
                  servicenow.event.state.display_value: "Resolved"
              - term:
                  servicenow.event.state.display_value: "Closed"
            filter:
              - range:
                  "@timestamp":
                    gte: "now-7d"
        sort:
          - "@timestamp":
              order: "desc"
    on-failure:
      continue: true

  # 6. Find recent change requests that might correlate
  - name: find_recent_changes
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.servicenowIndex }}/_search"
      body:
        size: 3
        query:
          bool:
            must:
              - term:
                  tags: "change_request"
              - range:
                  "@timestamp":
                    gte: "now-7d"
        sort:
          - "@timestamp":
              order: "desc"
    on-failure:
      continue: true

  # 7. Count total security alerts for this attack session (for Attack Discovery context)
  - name: count_related_alerts
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.securityAlertsIndex }}/_search"
      body:
        size: 0
        query:
          bool:
            must:
              - range:
                  "@timestamp":
                    gte: "now-1h"
            filter:
              - term:
                  kibana.alert.rule.tags: "Attack Discovery"
    on-failure:
      continue: true

  # 8. Send enriched notification to SOC
  - name: notify_email
    type: email
    connector-id: "Elastic-Cloud-SMTP"
    with:
      to:
        - "rob.kernutt@elastic.co"
      subject: "[SECURITY ALERT] {{ event.alerts[0].kibana.alert.rule.name }}"
      message: |
        A security alert has fired and been enriched with CMDB context.

        ALERT
        Rule: {{ event.alerts[0].kibana.alert.rule.name }}
        Alert: {{ event.alerts[0].message }}

        ATTACK ATTRIBUTION
        Attacker IP: {{ steps.find_attack_source.output.hits.hits[0]._source.source.ip }}
        Attacker User: {{ steps.find_attack_source.output.hits.hits[0]._source.user.name }}
        User Agent: {{ steps.find_attack_source.output.hits.hits[0]._source.user_agent.original }}

        AFFECTED INFRASTRUCTURE (ServiceNow CMDB)
        CI Name: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
        CI IP Address: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.ip_address.value }}
        CI Hostname: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.fqdn.value }}
        CI Owner: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}
        Support Group: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.support_group.display_value }}
        Department: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.department.display_value }}
        Location: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.location.display_value }}

        TARGET USER (ServiceNow)
        Name: {{ steps.lookup_target_user.output.hits.hits[0]._source.servicenow.event.name.value }}
        Email: {{ steps.lookup_target_user.output.hits.hits[0]._source.servicenow.event.email.value }}
        Phone: {{ steps.lookup_target_user.output.hits.hits[0]._source.servicenow.event.phone.value }}
        Manager: {{ steps.lookup_target_user.output.hits.hits[0]._source.servicenow.event.manager.display_value }}

        INCIDENT CONTEXT
        Related security alerts (1h): {{ steps.count_related_alerts.output.hits.total.value }}
        Open incidents on CI: {{ steps.find_open_incidents.output.hits.total.value }}
        Recent changes: {{ steps.find_recent_changes.output.hits.total.value }}

        NEXT STEPS
        1. Open Security > Alerts > filter by rule name
        2. Use Attack Discovery to see correlated attack patterns
        3. Open Agent Builder > SOC Analyst to investigate conversationally
        4. See docs/runbooks/ for triage, ES|QL queries, and containment steps
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  # 10. Index the enriched security alert for dashboards and Agent Builder
  - name: index_enriched_alert
    type: elasticsearch.index
    with:
      index: "logs-security-alert-enriched-default"
      document:
        "@timestamp": "{{ execution.startedAt }}"
        event:
          kind: "enrichment"
          category: ["intrusion_detection"]
          dataset: "security.alert.enriched"
        alert:
          rule_name: "{{ event.alerts[0].kibana.alert.rule.name }}"
          message: "{{ event.alerts[0].message }}"
        attack:
          source_ip: "{{ steps.find_attack_source.output.hits.hits[0]._source.source.ip }}"
          user: "{{ steps.find_attack_source.output.hits.hits[0]._source.user.name }}"
          user_agent: "{{ steps.find_attack_source.output.hits.hits[0]._source.user_agent.original }}"
        servicenow:
          ci_name: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}"
          ci_ip: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.ip_address.value }}"
          ci_hostname: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.fqdn.value }}"
          ci_owner: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.owned_by.display_value }}"
          support_group: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.support_group.display_value }}"
          department: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.department.display_value }}"
          location: "{{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.location.display_value }}"
          open_incident_count: "{{ steps.find_open_incidents.output.hits.total.value }}"
          related_alert_count: "{{ steps.count_related_alerts.output.hits.total.value }}"
    on-failure:
      continue: true

  - name: log_complete
    type: console
    with:
      message: >
        Security enrichment complete: {{ event.alerts[0].kibana.alert.rule.name }}.
        Attacker IP: {{ steps.find_attack_source.output.hits.hits[0]._source.source.ip }},
        Target CI: {{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.name.value }}
        ({{ steps.lookup_affected_ci.output.hits.hits[0]._source.servicenow.event.ip_address.value }}),
        Related alerts: {{ steps.count_related_alerts.output.hits.total.value }}
